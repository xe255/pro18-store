services:
  - type: web
    name: pro18-store
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PUBLIC_BASE_URL
        value: https://pro18-store.onrender.com
      - key: CLEARO_CURRENCY
        value: ILS
      - key: CLEARO_AMOUNT
        value: "249"
      - key: CLEARO_API_KEY
        sync: false
      - key: CLEARO_WEBHOOK_SECRET
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: INVENTORY_ENCRYPTION_KEY
        sync: false
      - key: META_PIXEL_ID
        value: "1397572895602522"
