<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#07111f">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <title>התשלום התקבל | Pro18</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800&family=Heebo:wght@800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ['Assistant'], display: ['Heebo'] } } } };
  </script>
</head>
<body class="min-h-screen bg-[#07111f] font-sans text-slate-100">
  <main class="grid min-h-screen place-items-center px-4 py-10">
    <section class="w-full max-w-xl overflow-hidden rounded-[2rem] border border-white/10 bg-white/[.045] p-6 text-center shadow-2xl backdrop-blur sm:p-10">
      <div id="pendingIcon" class="mx-auto grid size-20 place-items-center rounded-full border border-sky-300/20 bg-sky-300/10 text-3xl text-sky-300">
        <span class="animate-spin">◌</span>
      </div>
      <div id="successIcon" class="mx-auto hidden size-20 place-items-center rounded-full border border-emerald-300/20 bg-emerald-300/10 text-3xl text-emerald-300">✓</div>
      <h1 id="title" class="mt-6 font-display text-3xl font-black">התשלום נקלט</h1>
      <p id="message" class="mt-3 leading-7 text-slate-400">אנחנו מאמתים את העסקה ומכינים את קישור המימוש. זה לוקח בדרך כלל כמה שניות.</p>

      <div id="redemptionBox" class="mt-7 hidden rounded-2xl border border-emerald-300/20 bg-emerald-300/[.06] p-4 text-left">
        <p id="redemptionTitle" class="text-sm font-bold text-emerald-200">קישור Google AI Pro שלך מוכן</p>
        <div id="redemptionLinks" class="mt-4 space-y-3"></div>
        <p class="mt-3 text-xs text-slate-500">כל קישור מיועד להפעלה אחת. מומלץ לפתוח אותו מיד.</p>
      </div>

      <div id="manualBox" class="mt-7 hidden rounded-2xl border border-amber-300/20 bg-amber-300/[.06] p-4 text-sm leading-6 text-amber-100">
        התשלום אושר וההזמנה ממתינה למסירה. בעל העסק קיבל התראה ויטפל בה בהקדם.
      </div>

      <p id="orderNumber" class="mt-6 text-xs text-slate-600"></p>
      <a href="/" class="mt-7 inline-block text-sm font-bold text-slate-400 hover:text-white">חזרה לעמוד הראשי</a>
    </section>
  </main>

  <script>
    (() => {
      const params = new URLSearchParams(location.search);
      const order = params.get('order');
      const token = params.get('token');
      const title = document.getElementById('title');
      const message = document.getElementById('message');
      const orderNumber = document.getElementById('orderNumber');
      let attempts = 0;

      if (!order || !token) {
        title.textContent = 'פרטי ההזמנה חסרים';
        message.textContent = 'פתחו את הקישור המלא שקיבלתם לאחר התשלום.';
        return;
      }

      orderNumber.textContent = `מספר הזמנה: ${order}`;

      async function checkOrder() {
        attempts += 1;
        try {
          const response = await fetch(`/api/orders/${encodeURIComponent(order)}?token=${encodeURIComponent(token)}`, {
            cache: 'no-store',
          });
          if (!response.ok) throw new Error();
          const data = await response.json();

          const redemptionUrls = data.redemptionUrls || (data.redemptionUrl ? [data.redemptionUrl] : []);

          if (data.status === 'fulfilled' && redemptionUrls.length) {
            document.getElementById('pendingIcon').classList.add('hidden');
            document.getElementById('successIcon').classList.remove('hidden');
            document.getElementById('successIcon').classList.add('grid');
            title.textContent = redemptionUrls.length > 1 ? 'הקישורים שלך מוכנים' : 'הקישור שלך מוכן';
            message.textContent = redemptionUrls.length > 1
              ? 'התשלום אושר. כל קישור מימוש מיועד לחשבון Google נפרד.'
              : 'התשלום אושר והמינוי מוכן להפעלה.';
            document.getElementById('redemptionTitle').textContent = redemptionUrls.length > 1
              ? `${redemptionUrls.length} קישורי Google AI Pro מוכנים`
              : 'קישור Google AI Pro שלך מוכן';
            document.getElementById('redemptionLinks').innerHTML = redemptionUrls.map((url, index) => `
              <a href="${url}" target="_blank" rel="noopener noreferrer"
                 class="flex min-h-14 items-center justify-center rounded-xl bg-[#70f0c0] px-5 py-3 font-black text-[#07111f] transition hover:bg-[#91f7d2]">
                ${redemptionUrls.length > 1 ? `פתיחת קישור מימוש ${index + 1}` : 'פתיחת קישור המימוש'}
              </a>
            `).join('');
            document.getElementById('redemptionBox').classList.remove('hidden');
            return;
          }

          if (data.status === 'paid_awaiting_stock' || data.status === 'manual_review') {
            title.textContent = 'התשלום אושר';
            message.textContent = 'ההזמנה נקלטה בהצלחה.';
            document.getElementById('manualBox').classList.remove('hidden');
            return;
          }

          if (data.status === 'failed' || data.status === 'cancelled') {
            location.href = data.status === 'failed' ? '/failed' : '/cancelled';
            return;
          }
        } catch {
          if (attempts > 15) {
            message.textContent = 'האימות מתעכב מעט. אפשר להשאיר את העמוד פתוח או לחזור אליו בעוד מספר דקות.';
          }
        }

        if (attempts < 60) setTimeout(checkOrder, attempts < 10 ? 2000 : 5000);
      }

      checkOrder();
    })();
  </script>
</body>
</html>
